<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>👋</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: floatUp 3s ease-in-out infinite;
    }
    svg {
      width: min(380px, 80vw);
      filter: drop-shadow(0 0 40px rgba(220,50,50,0.5));
    }
    @keyframes floatUp {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-18px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">

      <!-- Wrist / palm base -->
      <rect x="62" y="210" width="76" height="90" rx="18" ry="18" fill="#e8b97a"/>
      <!-- Palm -->
      <rect x="55" y="150" width="90" height="90" rx="16" ry="16" fill="#e8b97a"/>

      <!-- Pinky (folded, small bump) -->
      <rect x="56" y="148" width="18" height="28" rx="9" ry="9" fill="#d9a86a"/>

      <!-- Ring finger (folded) -->
      <rect x="76" y="142" width="18" height="32" rx="9" ry="9" fill="#d9a86a"/>

      <!-- Middle finger (extended UP) -->
      <rect x="91" y="40" width="22" height="120" rx="11" ry="11" fill="#e8b97a"/>
      <!-- Middle fingertip rounding -->
      <ellipse cx="102" cy="42" rx="11" ry="13" fill="#e8b97a"/>
      <!-- Middle finger nail -->
      <rect x="95" y="48" width="14" height="22" rx="5" ry="5" fill="#c9956a"/>
      <!-- Knuckle line on middle finger -->
      <line x1="93" y1="125" x2="123" y2="125" stroke="#c9956a" stroke-width="2" stroke-linecap="round"/>

      <!-- Index finger (folded) -->
      <rect x="111" y="142" width="18" height="34" rx="9" ry="9" fill="#d9a86a"/>

      <!-- Thumb (tucked to side) -->
      <ellipse cx="62" cy="190" rx="14" ry="18" fill="#d9a86a" transform="rotate(-20 62 190)"/>

      <!-- Palm crease lines -->
      <path d="M65 185 Q100 178 135 185" stroke="#c9956a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M65 200 Q100 194 135 200" stroke="#c9956a" stroke-width="2" fill="none" stroke-linecap="round"/>

    </svg>
  </div>
</body>
</html>
